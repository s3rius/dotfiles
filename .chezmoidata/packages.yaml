  aur:
    - autojump-rs
    - gruvbox-plus-icon-theme-git
    - helm-ls-bin
    - nerd-fonts
    - terraform-ls-bin
    - ttf-symbola
    - ttf-ubraille
    - zen-browser-bin
    - bibata-cursor-theme-bin
  custom:
    - type: "git"
      repo: "https://github.com/robbyrussell/oh-my-zsh.git"
      install_command: "sh ./tools/install.sh --unattended"
      skip_if_exists: "$HOME/.oh-my-zsh"
    - type: "http"
      url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
      install_command: "unzip awscli-exe-linux-x86_64.zip && sudo ./aws/install"
      skip_if_exists: "/usr/local/bin/aws"
services:
  system:
    - sddm.service
    - docker.service
  user:
    - hyprpolkitagent.service
    - hyprpaper.service
